<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PTA 成本 & 利润计算器（实时汇率）</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background:#f5f5f5; margin:0; padding:20px; }
    .card { background:#fff; border-radius:16px; padding:20px; max-width:520px; margin:auto; box-shadow:0 10px 30px rgba(0,0,0,0.1);} 
    h2 { margin-top:0; }
    label { display:block; margin-top:12px; font-size:14px; color:#555; }
    input { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; margin-top:6px; }
    button { width:100%; padding:12px; border:none; border-radius:12px; background:#000; color:#fff; margin-top:16px; font-size:16px; cursor:pointer; }
    .result { margin-top:20px; padding:15px; background:#fafafa; border-radius:12px; }
    .profit { font-size:20px; font-weight:bold; margin-top:10px; }
    .good { color:green; }
    .bad { color:red; }
    .top { font-size:12px; color:#888; margin-bottom:10px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">实时汇率来自 currency.owo.nz</div>
    <h2>PTA 成本计算器</h2>

    <label>PX价格 (USD/吨)</label>
    <input id="px" value="1270" />

    <label>PTA现货价 (元/吨)</label>
    <input id="pta" value="6930" />

    <label>加工成本 (元/吨)</label>
    <input id="cost" value="500" />

    <button onclick="calc()">计算（自动获取汇率）</button>

    <div class="result" id="output">点击上面按钮开始计算</div>
  </div>

  <script>
    async function getRate() {
      try {
        const res = await fetch("https://currency.owo.nz/rate?from=USD&to=CNY");
        const data = await res.json();
        return data.rate;
      } catch (e) {
        console.error(e);
        alert("汇率获取失败，使用默认7.2");
        return 7.2;
      }
    }

    async function calc() {
      const px = parseFloat(document.getElementById('px').value);
      const pta = parseFloat(document.getElementById('pta').value);
      const cost = parseFloat(document.getElementById('cost').value);

      if (!px || !pta || !cost) {
        alert("请填写完整参数");
        return;
      }

      const rate = await getRate();

      const raw = 0.655 * 1.13 * 1.02 * px * rate;
      const total = raw + cost;
      const profit = pta - total;

      let statusClass = profit > 0 ? 'good' : 'bad';
      let statusText = profit > 0 ? '盈利' : '亏损';

      document.getElementById('output').innerHTML = `
        <div>当前汇率：<b>${rate.toFixed(2)}</b></div>
        <div>原料成本：${raw.toFixed(0)} 元/吨</div>
        <div>总成本：${total.toFixed(0)} 元/吨</div>
        <div class="profit ${statusClass}">利润：${profit.toFixed(0)} 元/吨（${statusText}）</div>
      `;
    }

    // 自动首次计算
    calc();

    // 每60秒刷新一次
    setInterval(calc, 60000);
  </script>
</body>
</html>
