<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>报价模板系统</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .container { max-width: 900px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; }
    h2 { margin-bottom: 10px; }
    .row { display: flex; margin-bottom: 10px; }
    .row label { width: 180px; }
    .row input, .row select { flex: 1; padding: 6px; }
    .btns { margin-top: 20px; display: flex; gap: 10px; }
    button { padding: 10px 15px; border: none; border-radius: 6px; cursor: pointer; }
    .primary { background: #007bff; color: white; }
    .success { background: #28a745; color: white; }
    .warning { background: #ffc107; }
    textarea { width: 100%; height: 200px; margin-top: 10px; font-family: monospace; }
    .output-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .output-box { display: flex; flex-direction: column; }
  </style>
</head>
<body>
  <div class="container">
    <h2>报价模板系统（稳定版）</h2>

    <div class="row"><label>公司 Company</label><input id="company" value="DYHO GROUP LIMITED"></div>
    <div class="row"><label>产品 Material</label><input id="material" value="YS-W01 / YS-C01"></div>

    <div class="row"><label>贸易方式 Trade</label>
      <select id="trade">
        <option value="FOB">FOB</option>
        <option value="CIF">CIF</option>
      </select>
    </div>

    <div class="row"><label>付款方式 Payment</label>
      <select id="payment">
        <option>LC AT SIGHT</option>
        <option>LC 30 DAYS</option>
        <option>LC 60 DAYS</option>
        <option>TT 30/70</option>
        <option>TT 20/80</option>
        <option>TT 100%</option>
        <option>OA 30 DAYS</option>
        <option>OA 60 DAYS</option>
      </select>
    </div>

    <div class="row"><label>包装规格 Packing</label>
      <select id="packing">
        <option value="1.1">1.1 吨包</option>
        <option value="1.15">1.15 吨包</option>
      </select>
    </div>

    <div class="row"><label>数量 Quantity (MT)</label><input id="qty" type="number" value="46"></div>
    <div class="row"><label>柜数 Containers (自动)</label><input id="container" disabled></div>

    <div class="row"><label>单柜运费 USD/Container</label><input id="containerFreight" type="number" value="0"></div>

    <div class="row"><label>当日价格 Price (USD/MT)</label><input id="price" type="number" value="835"></div>
    <div class="row"><label>其他费用 Other</label><input id="other" type="number" value="1"></div>
    <div class="row"><label>中信保 Insurance</label><input id="insurance" type="number" value="1"></div>

    <div class="row"><label>运费 Freight/MT</label><input id="freight" disabled></div>
    <div class="row"><label>合同价格 Contract</label><input id="contract" disabled></div>

    <div class="btns">
      <button class="primary" onclick="calc()">计算价格</button>
      <button class="success" onclick="copyText()">一键复制</button>
      <button class="warning" onclick="exportTxt()">导出报价</button>
    </div>

    <div class="output-wrap">
      <div class="output-box">
        <label>中文报价</label>
        <textarea id="outputCN"></textarea>
      </div>
      <div class="output-box">
        <label>English Quotation</label>
        <textarea id="outputEN"></textarea>
      </div>
    </div>
  </div>

  <script>
    function calc() {
      const trade = document.getElementById('trade').value;
      const packing = parseFloat(document.getElementById('packing').value);
      const qty = parseFloat(document.getElementById('qty').value) || 0;
      const bags = 20;
      const containerFreight = parseFloat(document.getElementById('containerFreight').value) || 0;

      const price = parseFloat(document.getElementById('price').value) || 0;
      const other = parseFloat(document.getElementById('other').value) || 0;
      const insurance = parseFloat(document.getElementById('insurance').value) || 0;

      const tonPerContainer = packing * bags;

      const containers = Math.ceil(qty / tonPerContainer);
      document.getElementById('container').value = containers;

      let freightPerTon = 0;
      if (trade === "CIF") {
        freightPerTon = Math.ceil(containerFreight / tonPerContainer);
      }

      document.getElementById('freight').value = freightPerTon.toFixed(2);

      let total = price + freightPerTon + other + insurance;
      total = Math.round(total);

      document.getElementById('contract').value = total;

      const textCN = `报价单
==================================================
公司: ${company.value}
数量: ${qty} 吨
产品: ${material.value}
贸易方式: ${trade}
付款方式: ${payment.value}
包装: ${packing} 吨/包
--------------------------------------------------
基础价格:   USD ${price.toFixed(2)}
运费:       USD ${freightPerTon.toFixed(2)}
其他费用:   USD ${other.toFixed(2)}
中信保:     USD ${insurance.toFixed(2)}
--------------------------------------------------
合同价格:   USD ${total.toFixed(2)}
==================================================
有效期: 以最终确认为准`;

      const textEN = `QUOTATION
==================================================
Company: ${company.value}
Quantity: ${qty} MT
Material: ${material.value}
Trade Terms: ${trade}
Payment: ${payment.value}
Packing: ${packing} MT BAG
--------------------------------------------------
Base Price:   USD ${price.toFixed(2)}
Freight:      USD ${freightPerTon.toFixed(2)}
Other Charges:USD ${other.toFixed(2)}
Insurance:    USD ${insurance.toFixed(2)}
--------------------------------------------------
Contract Price: USD ${total.toFixed(2)}
==================================================
Validity: Subject to final confirmation`;

      document.getElementById('outputCN').value = textCN;
      document.getElementById('outputEN').value = textEN;
    }

    function copyText() {
      const text = document.getElementById('outputEN').value;
      navigator.clipboard.writeText(text);
      alert('已复制英文报价');
    }

    function exportTxt() {
      const content = document.getElementById('outputCN').value + "\n\n" + document.getElementById('outputEN').value;
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'Quotation.txt';
      a.click();
    }
  </script>
</body>
</html>
